services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: orbiteus
      POSTGRES_PASSWORD: orbiteus
      POSTGRES_DB: orbiteus
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orbiteus"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://orbiteus:orbiteus@postgres:5432/orbiteus
      SECRET_KEY: change-me-in-production
      ENVIRONMENT: development
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
    command: ["--reload"]

  frontend:
    build:
      context: ./admin-ui
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      # Internal Docker network URL — Next.js rewrites use this server-side
      BACKEND_URL: http://backend:8000
    volumes:
      - ./admin-ui:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    command: npm run dev -- --hostname 0.0.0.0

volumes:
  postgres_data:
