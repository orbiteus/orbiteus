# 1) Copy to /etc/nginx/sites-available/demo.orbiteus.com and enable symlink.
# 2) Ensure Docker publishes Next on 127.0.0.1:13100 (see DEMO_HOST_PORT in .env.demo).
# 3) nginx -t && systemctl reload nginx
# 4) certbot --nginx -d demo.orbiteus.com  (adds TLS to this server block)

upstream orbiteus_demo_next {
    server 127.0.0.1:13100;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name demo.orbiteus.com;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    client_max_body_size 25m;

    location / {
        proxy_pass http://orbiteus_demo_next;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }
}
