name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend (pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: orbiteus
          POSTGRES_PASSWORD: orbiteus
          POSTGRES_DB: orbiteus
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U orbiteus"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://orbiteus:orbiteus@localhost:5432/orbiteus_test

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Create test database
        env:
          PGPASSWORD: orbiteus
        run: psql -h localhost -U orbiteus -d orbiteus -c "CREATE DATABASE orbiteus_test;"

      - name: Run pytest
        run: pytest -q

  admin-ui:
    name: admin-ui (vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: admin-ui

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Unit tests
        run: npm test
